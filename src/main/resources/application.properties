spring.application.name=baza

app.telegram.token=${TELEGRAM_TOKEN}
app.telegram.url=https://api.telegram.org/bot
app.telegram.update-listener-sleep=1s

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/baza
spring.datasource.username=baza_user
spring.datasource.password=baza_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=memes

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB