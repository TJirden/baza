services:
  postgres:
    image: postgres:16
    container_name: baza_postgres
    environment:
      POSTGRES_DB: baza
      POSTGRES_USER: baza_user
      POSTGRES_PASSWORD: baza_password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    network_mode: bridge

  minio:
    image: minio/minio:latest
    container_name: baza_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio-data:/data
    restart: unless-stopped
    network_mode: bridge